<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1200單 單字練習</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --card: #222540;
    --accent: #7c6af7;
    --accent2: #f7936a;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8eaf6;
    --muted: #8b8fa8;
    --border: #2e3150;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.12) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(247,147,106,0.08) 0%, transparent 60%);
  }

  #app {
    width: 100%;
    max-width: 640px;
  }

  /* ---- START SCREEN ---- */
  #start-screen {
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .logo {
    font-size: 72px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, #7c6af7, #f7936a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 36px;
    font-weight: 600;
  }

  .info-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 36px;
  }

  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
  }

  .info-card .num {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
    display: block;
  }

  .info-card .label {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
  }

  .btn-start {
    background: linear-gradient(135deg, #7c6af7, #a78bfa);
    color: white;
    border: none;
    padding: 18px 48px;
    font-size: 1.2rem;
    font-weight: 800;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(124,106,247,0.4);
    font-family: 'Nunito', sans-serif;
    letter-spacing: 0.5px;
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,106,247,0.5);
  }

  .btn-start:active { transform: translateY(0); }

  /* ---- GAME SCREEN ---- */
  #game-screen { animation: fadeIn 0.4s ease; }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .progress-info {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
  }

  .progress-info span {
    color: var(--text);
    font-size: 1.1rem;
  }

  .progress-bar-wrap {
    flex: 1;
    margin: 0 16px;
    height: 8px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c6af7, #f7936a);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .score-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--green);
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 32px 32px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #7c6af7, #f7936a);
  }

  .q-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-word {
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .attempt-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 16px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }

  .dot.wrong { background: var(--red); }

  /* Feedback banner */
  .feedback-banner {
    border-radius: 16px;
    padding: 14px 24px;
    text-align: center;
    font-size: 1.3rem;
    font-weight: 900;
    margin-bottom: 20px;
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }

  .feedback-banner.show {
    opacity: 1;
    transform: scale(1);
  }

  .feedback-banner.correct {
    background: rgba(74,222,128,0.15);
    border: 2px solid rgba(74,222,128,0.4);
    color: var(--green);
  }

  .feedback-banner.wrong {
    background: rgba(248,113,113,0.15);
    border: 2px solid rgba(248,113,113,0.3);
    color: var(--red);
  }

  /* Choices */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .choice-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    text-align: center;
    line-height: 1.3;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(124,106,247,0.1);
    transform: translateY(-2px);
  }

  .choice-btn:active:not(:disabled) { transform: translateY(0); }

  .choice-btn.correct-ans {
    border-color: var(--green);
    background: rgba(74,222,128,0.12);
    color: var(--green);
  }

  .choice-btn.wrong-ans {
    border-color: var(--red);
    background: rgba(248,113,113,0.12);
    color: var(--red);
  }

  .choice-btn:disabled { cursor: default; }

  /* ---- RESULT SCREEN ---- */
  #result-screen { animation: fadeIn 0.5s ease; }

  .result-hero {
    text-align: center;
    margin-bottom: 32px;
  }

  .result-emoji {
    font-size: 64px;
    display: block;
    margin-bottom: 12px;
    animation: bounceIn 0.5s ease;
  }

  @keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-title {
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 6px;
  }

  .result-score {
    font-size: 1.1rem;
    color: var(--muted);
    font-weight: 700;
  }

  .result-score span { color: var(--accent); font-size: 1.4rem; }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
  }

  .stat-box .num {
    font-size: 2rem;
    font-weight: 900;
    display: block;
  }

  .stat-box .lbl {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 700;
  }

  .stat-box.correct .num { color: var(--green); }
  .stat-box.wrong .num { color: var(--red); }

  /* Review list */
  .review-section h3 {
    font-size: 1rem;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .review-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 28px;
    max-height: 380px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .review-list::-webkit-scrollbar { width: 4px; }
  .review-list::-webkit-scrollbar-track { background: var(--surface); border-radius: 4px; }
  .review-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .review-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
  }

  .review-item.wrong-item {
    border-color: rgba(248,113,113,0.35);
    background: rgba(248,113,113,0.06);
  }

  .review-item .ri-num {
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--muted);
    min-width: 20px;
  }

  .review-item .ri-icon {
    font-size: 1.1rem;
    min-width: 22px;
    text-align: center;
  }

  .review-item .ri-en {
    font-weight: 800;
    font-size: 1rem;
    flex: 1;
  }

  .review-item.wrong-item .ri-en { color: var(--red); }
  .review-item.correct-item .ri-en { color: var(--green); }

  .review-item .ri-zh {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 600;
    text-align: right;
    flex: 1;
  }

  .btn-again {
    width: 100%;
    background: linear-gradient(135deg, #7c6af7, #a78bfa);
    color: white;
    border: none;
    padding: 18px;
    font-size: 1.15rem;
    font-weight: 800;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(124,106,247,0.35);
    font-family: 'Nunito', sans-serif;
  }

  .btn-again:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(124,106,247,0.45);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Shake animation for wrong */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .shake { animation: shake 0.4s ease; }

  .hidden { display: none !important; }

  /* ---- MUSIC BUTTON ---- */
  .music-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    z-index: 999;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .music-btn:hover {
    background: var(--accent);
    transform: scale(1.1);
    box-shadow: 0 4px 20px rgba(124,106,247,0.4);
  }
  .music-btn.playing {
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.3), 0 4px 16px rgba(124,106,247,0.35);
    animation: musicPulse 1.5s ease-in-out infinite;
  }
  @keyframes musicPulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(124,106,247,0.3), 0 4px 16px rgba(124,106,247,0.35); }
    50%      { box-shadow: 0 0 0 6px rgba(124,106,247,0.15), 0 4px 20px rgba(124,106,247,0.45); }
  }
</style>
</head>

<button class="music-btn" id="music-btn" onclick="toggleMusic()" title="背景音樂">🎵</button>

<div id="app">

  <div id="start-screen">

        <span class="num">1180</span>

    <div class="feedback-banner" id="feedback-banner"></div>

    <div class="choices" id="choices"></div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="hidden">
    <div class="result-hero">
      <span class="result-emoji" id="result-emoji">🎉</span>
      <div class="result-title" id="result-title">練習完成！</div>
      <div class="result-score">答對 <span id="final-correct">0</span> / 20 題</div>
    </div>

    <div class="result-stats">
      <div class="stat-box correct">
        <span class="num" id="rs-correct">0</span>
        <span class="lbl">✓ 答對</span>
      </div>
      <div class="stat-box wrong">
        <span class="num" id="rs-wrong">0</span>
        <span class="lbl">✗ 答錯</span>
      </div>
    </div>

    <div class="review-section">
      <h3>📝 本回複習</h3>
      <div class="review-list" id="review-list"></div>
    </div>

    <button class="btn-again" onclick="startGame()">🔄 再玩一次（新題目）</button>
  </div>

</div>

// Deduplicate vocab by english key (keep first occurrence)
const seen = new Set();
const WORDS = VOCAB.filter(w => {
  if (seen.has(w.english)) return false;
  seen.add(w.english);
  return true;
});

// Game state
let questions = [];
let currentQ = 0;
let score = 0;
let wrongAttempts = 0;
let results = []; // {word, correct: bool}
let locked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions() {
  return shuffle(WORDS).slice(0, 20);
}

function getChoices(correctWord) {
  const distractors = shuffle(WORDS.filter(w => w.english !== correctWord.english)).slice(0, 3);
  return shuffle([correctWord, ...distractors]);
}

function startGame() {
  questions = pickQuestions().map(q => ({
    word: q,
    choices: getChoices(q),
    wrongCount: 0,
    everWrong: false,
  }));
  currentQ = 0;
  score = 0;
  results = [];
  locked = false;

  show('game-screen');
  hide('start-screen');
  hide('result-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  wrongAttempts = q.wrongCount;

  document.getElementById('q-current').textContent = currentQ + 1;
  document.getElementById('score-display').textContent = score;
  document.getElementById('progress-bar').style.width = ((currentQ / 20) * 100) + '%';
  document.getElementById('q-word').textContent = q.word.english;

  // Dots
  const dots = document.getElementById('attempt-dots');
  dots.innerHTML = '';
  for (let i = 0; i < q.wrongCount; i++) {
    const d = document.createElement('div');
    d.className = 'dot wrong';
    dots.appendChild(d);
  }

  // Feedback
  hideFeedback();

  // Choices
  const container = document.getElementById('choices');
  container.innerHTML = '';
  q.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.chinese;
    btn.onclick = () => handleAnswer(choice, btn, q);
    container.appendChild(btn);
  });

  locked = false;
}

function handleAnswer(choice, btn, q) {
  if (locked) return;

  const isCorrect = choice.english === q.word.english;

  if (isCorrect) {
    locked = true;
    btn.classList.add('correct-ans');
    showFeedback(true);
    playCorrectSfx();

    // Disable all
    disableChoices();

    if (!q.everWrong) score++;
    document.getElementById('score-display').textContent = score;

    results.push({ word: q.word, correct: !q.everWrong });

    setTimeout(() => {
      currentQ++;
      if (currentQ >= 20) {
        playFinishSfx();
        showResults();
      } else {
        renderQuestion();
      }
    }, 800);
  } else {
    q.wrongCount++;
    q.everWrong = true;
    btn.classList.add('wrong-ans');
    showFeedback(false);
    playWrongSfx();

    // Shake the question card
    const card = document.getElementById('question-card');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');

    // Update dots
    const dots = document.getElementById('attempt-dots');
    const d = document.createElement('div');
    d.className = 'dot wrong';
    dots.appendChild(d);

    // Re-enable correct choice highlight after short delay, reset wrong btn
    setTimeout(() => {
      btn.classList.remove('wrong-ans');
      hideFeedback();
    }, 700);
  }
}

function disableChoices() {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
}

function showFeedback(correct) {
  const fb = document.getElementById('feedback-banner');
  fb.textContent = correct ? '🎉 Great!' : '❌ Try again!';
  fb.className = 'feedback-banner show ' + (correct ? 'correct' : 'wrong');
}

function hideFeedback() {
  const fb = document.getElementById('feedback-banner');
  fb.className = 'feedback-banner';
}

function showResults() {
  hide('game-screen');
  show('result-screen');

  const correct = results.filter(r => r.correct).length;
  const wrong = results.filter(r => !r.correct).length;

  document.getElementById('final-correct').textContent = correct;
  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent = wrong;

  // Emoji + title
  let emoji, title;
  if (correct === 20) { emoji = '🏆'; title = '完美！全部答對！'; }
  else if (correct >= 16) { emoji = '🎉'; title = '太棒了！'; }
  else if (correct >= 12) { emoji = '👍'; title = '不錯喔！繼續加油！'; }
  else { emoji = '💪'; title = '繼續練習！你可以的！'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;

  // Review list: wrong first, then correct
  const wrongItems = results.filter(r => !r.correct);
  const correctItems = results.filter(r => r.correct);
  const ordered = [...wrongItems, ...correctItems];

  const list = document.getElementById('review-list');
  list.innerHTML = '';

  ordered.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'review-item ' + (r.correct ? 'correct-item' : 'wrong-item');
    div.innerHTML = `
      <span class="ri-num">${i + 1}</span>
      <span class="ri-icon">${r.correct ? '✅' : '❌'}</span>
      <span class="ri-en">${r.word.english}</span>
      <span class="ri-zh">${r.word.chinese}</span>
    `;
    list.appendChild(div);
  });
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// ===================== AUDIO ENGINE =====================
let audioCtx = null;
let musicPlaying = false;
let musicNodes = [];
let scheduledIds = [];

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// --- Sound Effects ---
function playCorrectSfx() {
  const ctx = getCtx();
  const notes = [523.25, 659.25, 783.99]; // C5 E5 G5
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.start(t); osc.stop(t + 0.35);
  });
}

function playWrongSfx() {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.25);
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
  osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
}

function playFinishSfx() {
  const ctx = getCtx();
  const melody = [523.25, 659.25, 783.99, 1046.5];
  melody.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.2, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.start(t); osc.stop(t + 0.55);
  });
}

// --- Background Music (looping chiptune) ---
// Scale: C major pentatonic [C4, E4, G4, A4, C5, E5, G5]
const PENTA = [261.63, 329.63, 392.00, 440.00, 523.25, 659.25, 783.99];
const BASS =  [130.81, 164.81, 196.00, 220.00, 261.63];

function makeMusicLoop() {
  const ctx = getCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.18;
  masterGain.connect(ctx.destination);

  const BPM = 128;
  const beat = 60 / BPM;
  const bar = beat * 4;

  // Simple melodic pattern (16 steps, indexes into PENTA, -1 = rest)
  const melodyPat = [4,4,5,3, 4,-1,5,5, 3,4,5,4, 2,-1,4,-1];
  const bassPat   = [0,-1,2,-1, 1,-1,0,-1, 2,-1,3,-1, 0,-1,2,-1];

  let startTime = ctx.currentTime + 0.05;
  const loopBars = 4;
  const totalSteps = 16 * loopBars;

  function scheduleLoop(loopStart) {
    for (let step = 0; step < 16; step++) {
      const stepTime = loopStart + step * (beat / 2);

      // Melody
      const mIdx = melodyPat[step % 16];
      if (mIdx >= 0) {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'square';
        osc.frequency.value = PENTA[mIdx];
        g.gain.setValueAtTime(0, stepTime);
        g.gain.linearRampToValueAtTime(0.5, stepTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, stepTime + beat * 0.45);
        osc.start(stepTime); osc.stop(stepTime + beat * 0.5);
        musicNodes.push(osc, g);
      }

      // Bass
      const bIdx = bassPat[step % 16];
      if (bIdx >= 0) {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'triangle';
        osc.frequency.value = BASS[bIdx];
        g.gain.setValueAtTime(0, stepTime);
        g.gain.linearRampToValueAtTime(0.6, stepTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, stepTime + beat * 0.9);
        osc.start(stepTime); osc.stop(stepTime + beat);
        musicNodes.push(osc, g);
      }

      // Hi-hat on every step
      {
        const bufSize = ctx.sampleRate * 0.05;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const hiFilter = ctx.createBiquadFilter();
        hiFilter.type = 'highpass'; hiFilter.frequency.value = 7000;
        const g = ctx.createGain();
        src.connect(hiFilter); hiFilter.connect(g); g.connect(masterGain);
        g.gain.setValueAtTime(step % 2 === 0 ? 0.3 : 0.12, stepTime);
        g.gain.exponentialRampToValueAtTime(0.001, stepTime + 0.04);
        src.start(stepTime); src.stop(stepTime + 0.05);
        musicNodes.push(src, g);
      }

      // Kick on beats 1 and 3
      if (step % 8 === 0 || step % 8 === 4) {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(160, stepTime);
        osc.frequency.exponentialRampToValueAtTime(40, stepTime + 0.15);
        g.gain.setValueAtTime(0.8, stepTime);
        g.gain.exponentialRampToValueAtTime(0.001, stepTime + 0.18);
        osc.start(stepTime); osc.stop(stepTime + 0.2);
        musicNodes.push(osc, g);
      }
    }

    // Schedule next loop slightly before this one ends
    const nextLoopStart = loopStart + 16 * (beat / 2);
    const delay = (nextLoopStart - ctx.currentTime - 0.3) * 1000;
    const id = setTimeout(() => {
      if (musicPlaying) scheduleLoop(nextLoopStart);
    }, Math.max(delay, 0));
    scheduledIds.push(id);
  }

  musicNodes.push(masterGain);
  scheduleLoop(startTime);
}

function stopMusic() {
  musicPlaying = false;
  scheduledIds.forEach(id => clearTimeout(id));
  scheduledIds = [];
  musicNodes.forEach(n => {
    try { n.disconnect(); } catch(e) {}
    if (n.stop) { try { n.stop(0); } catch(e) {} }
  });
  musicNodes = [];
}

function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (musicPlaying) {
    stopMusic();
    btn.textContent = '🔇';
    btn.classList.remove('playing');
  } else {
    musicPlaying = true;
    makeMusicLoop();
    btn.textContent = '🎵';
    btn.classList.add('playing');
  }
}
</script>
</body>
